<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Tìm Kiếm - Thọ Cho Thuê Trọ</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner-border text-warning" role="status"></div>
    </div>

    <div id="dynamic-navbar"></div>

    <div class="map-layout-grid">
        <div class="half-map-list d-flex flex-column bg-light">
            <div class="p-3">
                <div class="bg-white p-3 rounded border mb-3 shadow-sm">
                    <h6 class="fw-bold mb-3"><i class="fas fa-filter text-warning"></i> Bộ lọc nhanh</h6>
                    <div class="row g-2">
                        <div class="col-6">
                            <select class="form-select form-select-sm" id="f-district" onchange="applyFilters()">
                                <option value="all">Tất cả Khu vực</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <select class="form-select form-select-sm" id="type-filter" onchange="applyFilters()">
                                <option value="all">Loại phòng</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <select class="form-select form-select-sm" id="f-price" onchange="applyFilters()">
                                <option value="all">Mọi mức giá</option>
                                <option value="0-4000000">Dưới 4 Triệu</option>
                                <option value="4000000-6000000">4 - 6 Triệu</option>
                                <option value="6000000-8000000">6 - 8 Triệu</option>
                                <option value="8000000-99000000">Trên 8 Triệu</option>
                            </select>
                        </div>
                        <div class="col-12 mt-2">
                            <label class="small fw-bold mb-1">Tiện ích:</label>
                            <div id="f-amenities-checkboxes" class="amenities-grid" onchange="applyFilters()"></div>
                        </div>
                    </div>
                </div>

                <div id="half-map-list-content"></div>
            </div>
        </div>

        <div id="half-map-view" class="half-map-view bg-white border-start position-relative"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="main.js"></script>
    <div class="mobile-bottom-nav">
    <div class="row g-0 h-100">
        <div class="col-6">
            <a href="tel:0925996992" class="btn btn-danger w-100 h-100 rounded-0 d-flex align-items-center justify-content-center fw-bold text-uppercase" style="font-size: 1.1rem;">
                <i class="fas fa-phone-alt me-2"></i> Gọi điện
            </a>
        </div>
        <div class="col-6">
            <a href="https://zalo.me/0925996992" target="_blank" class="btn btn-primary w-100 h-100 rounded-0 d-flex align-items-center justify-content-center fw-bold text-uppercase" style="font-size: 1.1rem;">
                <i class="fas fa-comment-dots me-2"></i> Chat Zalo
            </a>
        </div>
    </div>
</div>
</body>
</html>
