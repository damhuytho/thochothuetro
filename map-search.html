<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Tìm Kiếm - Thọ Cho Thuê Trọ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { overflow: hidden; } 
        .navbar { position: relative !important; } 
        .map-layout-grid {
            display: grid;
            grid-template-columns: 450px 1fr;
            height: calc(100vh - 76px);
        }
        @media (max-width: 768px) {
            .map-layout-grid { grid-template-columns: 1fr; height: auto; }
            .half-map-view { height: 400px; order: -1; }
            body { overflow: auto; }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner-border text-warning" role="status"></div>
    </div>

    <nav class="navbar navbar-expand-lg border-bottom">
        <div class="container-fluid px-4">
            <a class="navbar-brand lh-1" href="index.html">
                <div class="brand-text"><i class="fas fa-building me-2"></i>THỌ CHO THUÊ TRỌ</div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto fw-bold gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="tan-binh.html">Quận Tân Bình</a></li>
                    <li class="nav-item"><a class="nav-link" href="phu-nhuan.html">Quận Phú Nhuận</a></li>
                    <li class="nav-item"><a class="nav-link active" href="map-search.html">Bản đồ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="map-layout-grid">
        <div class="half-map-list d-flex flex-column">
            
            <div class="bg-white p-3 rounded border mb-3 shadow-sm">
                <h6 class="fw-bold mb-3"><i class="fas fa-filter text-warning"></i> Bộ lọc nhanh</h6>
                <div class="row g-2">
                    <div class="col-6">
                        <select class="form-select form-select-sm" id="f-district" onchange="applyFilters()">
                            <option value="all">Tất cả Khu vực</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <select class="form-select form-select-sm" id="type-filter" onchange="applyFilters()">
                            <option value="all">Loại phòng</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <select class="form-select form-select-sm" id="f-price" onchange="applyFilters()">
                            <option value="all">Mọi mức giá</option>
                            <option value="0-4000000">Dưới 4 Triệu</option>
                            <option value="4000000-6000000">4 - 6 Triệu</option>
                            <option value="6000000-8000000">6 - 8 Triệu</option>
                            <option value="8000000-99000000">Trên 8 Triệu</option>
                        </select>
                    </div>
                    <div class="col-12 mt-2">
                        <label class="small fw-bold mb-1">Tiện ích:</label>
                        <div id="f-amenities-checkboxes" class="amenities-grid" onchange="applyFilters()"></div>
                    </div>
                </div>
            </div>

            <div id="half-map-list-content" class="flex-grow-1"></div>
        </div>

        <div id="half-map-view" class="half-map-view bg-light border-start"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
